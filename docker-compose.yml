services:
  # MediaMTX - Serveur d'ingestion média unifié (RTSP/RTMP/SRT/UDP)
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: drone-surveillance-mediamtx
    ports:
      - "1935:1935"   # RTMP
      - "554:554"     # RTSP
      - "8554:8554"   # RTSP (internal)
      - "8888:8888"   # HTTP (HLS)
      - "8889:8889"   # RTSP over TCP
      - "8189:8189"   # WebRTC (UDP/ICE)
      - "8890:8890"   # SRT
      - "8892:8892"   # MoQ
    volumes:
      - ./ingestion/mediamtx.yml:/mediamtx.yml:ro
      - ./data:/data
      - media_data:/data/media
    restart: unless-stopped
    networks:
      - drone-surveillance-network

  # Redis - Bus de messages pour les alertes temps réel
  redis:
    image: redis:7-alpine
    container_name: drone-surveillance-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - drone-surveillance-network

  # PostgreSQL - Base de données avec PostGIS
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: drone-surveillance-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drone_surveillance}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - drone-surveillance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drone-surveillance-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-drone_surveillance}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CHANNEL: alerts
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - drone-surveillance-network

  # TileServer-GL - Serveur de tuiles OSM locales
  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: drone-surveillance-tileserver
    ports:
      - "8080:8080"
    volumes:
      - ./data/tiles:/data
    command: ["--port", "8080"]
    restart: unless-stopped
    networks:
      - drone-surveillance-network

  # Frontend - React Dashboard with nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drone-surveillance-frontend
    ports:
      - "3000:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/media:/data/media:ro
    depends_on:
      - backend
      - mediamtx
    restart: unless-stopped
    networks:
      - drone-surveillance-network

networks:
  drone-surveillance-network:
    driver: bridge

volumes:
  postgres_data:
  media_data:
